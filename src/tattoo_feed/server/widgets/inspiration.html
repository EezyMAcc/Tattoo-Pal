<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tattoo Inspiration</title>
  <style>
    body { margin: 0; font-family: sans-serif; padding: 12px; }
    img { max-width: 100%; border-radius: 4px; display: block; }
    .handle { font-weight: bold; margin-top: 8px; }
    .caption { color: #555; margin: 4px 0; font-size: 0.9em; }
    a { color: #1a73e8; text-decoration: none; font-size: 0.85em; }
    a:empty { display: none; }
  </style>
</head>
<body>
  <img id="preview" alt="Tattoo preview">
  <div class="handle" id="handle"></div>
  <div class="caption" id="caption"></div>
  <a id="permalink" target="_blank"></a>
  <script>
    function render(meta) {
      if (!meta) return;
      document.getElementById("preview").src = meta.imageDataUrl || "";
      document.getElementById("handle").textContent = meta.handle ? "@" + meta.handle : "";
      document.getElementById("caption").textContent = meta.caption || "";
      var link = document.getElementById("permalink");
      link.href = meta.permalink || "#";
      link.textContent = meta.permalink ? "View on Instagram →" : "";
    }

    // The host exposes the tool result's _meta (where the image data URL lives)
    // as window.openai.toolResponseMetadata, and the structuredContent as
    // window.openai.toolOutput. Reading the _meta keeps base64 out of the model
    // context (RESEARCH.md §1.4); fall back to toolOutput for the text fields.
    function update() {
      if (window.openai) {
        render(window.openai.toolResponseMetadata || window.openai.toolOutput);
      }
    }

    update();  // initial render on first load

    // Repeated tool calls update the window.openai globals in place rather than
    // reloading this script; the host fires `openai:set_globals` each time (Apps
    // SDK reference). Without re-rendering on it, the image only appears on the
    // first call and subsequent cards stay blank ("worked once then stopped").
    window.addEventListener("openai:set_globals", update);

    // Fallback: some hosts also push results via a postMessage notification.
    window.addEventListener("message", function(event) {
      var d = event.data;
      if (!d || d.method !== "ui/notifications/tool-result") return;
      var params = d.params || {};
      render(params._meta || params.structuredContent);
    });
  </script>
</body>
</html>
